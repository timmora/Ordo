version: '3.8'

services:
  db:
    image: postgres:15
    container_name: portfolio-optimizer-db
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio123
      POSTGRES_DB: portfolio_optimizer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio_optimizer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
